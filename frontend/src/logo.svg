<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8734A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5A623;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D4A3E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A2E26;stop-opacity:1" />
    </linearGradient>
    <clipPath id="iconClip">
      <circle cx="40" cy="40" r="34"/>
    </clipPath>
  </defs>

  <!-- Icon: circle badge -->
  <circle cx="40" cy="40" r="34" fill="url(#skyGrad)"/>

  <!-- Sun -->
  <circle cx="40" cy="22" r="7" fill="#FFF5E0" opacity="0.95"/>

  <!-- Mountains -->
  <polygon points="14,54 40,22 66,54" fill="url(#mountGrad)" clip-path="url(#iconClip)"/>
  <polygon points="28,54 50,32 72,54" fill="#3A6B55" opacity="0.85" clip-path="url(#iconClip)"/>

  <!-- Snow cap -->
  <polygon points="40,22 35,32 45,32" fill="#FEFEFE" opacity="0.9" clip-path="url(#iconClip)"/>

  <!-- Ground strip -->
  <rect x="6" y="54" width="68" height="14" rx="0" fill="#1A2E26" clip-path="url(#iconClip)"/>

  <!-- Path / trail -->
  <path d="M28,68 Q40,56 52,68" stroke="#F5A623" stroke-width="1.8" fill="none" opacity="0.8" clip-path="url(#iconClip)"/>

  <!-- Wordmark: WANDER -->
  <text
    x="86"
    y="36"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="700"
    letter-spacing="3"
    fill="#1A2E26"
  >WANDER</text>

  <!-- Wordmark: blog (accent) -->
  <text
    x="90"
    y="58"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="17"
    font-weight="400"
    font-style="italic"
    letter-spacing="6"
    fill="#E8734A"
  >blog</text>

  <!-- Thin underline accent between the two words -->
  <line x1="86" y1="41" x2="308" y2="41" stroke="#E8734A" stroke-width="0.8" opacity="0.4"/>
</svg>
